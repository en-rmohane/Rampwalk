<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Ramp Walk</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c; --gold-light: #f0d080; --deep: #080510;
  --panel: #110d1a; --border: rgba(201,168,76,0.25);
  --cream: #f5efe0; --rose: #e8a0b4; --error: #e05050;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--deep); color: var(--cream);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 50%, #3d0c1f33 0%, transparent 70%);
}
.login-card {
  position: relative; z-index: 1;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 24px; padding: 2.5rem;
  max-width: 400px; width: 100%;
  box-shadow: 0 30px 60px rgba(0,0,0,0.5);
  text-align: center;
}
.icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
h1 {
  font-family: 'Playfair Display', serif; font-size: 1.8rem;
  color: var(--gold-light); margin-bottom: 0.5rem;
}
.subtitle { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
.form-group { text-align: left; margin-bottom: 1.5rem; }
label { display: block; font-size: 0.8rem; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
input[type=password] {
  width: 100%; padding: 1rem;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 12px;
  color: var(--cream); font-family: 'Rajdhani', sans-serif; font-size: 1.1rem;
  outline: none; transition: border 0.3s;
}
input[type=password]:focus { border-color: var(--gold); }
.btn {
  width: 100%; padding: 1rem; border: none; border-radius: 12px; cursor: pointer;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--deep); font-family: 'Rajdhani', sans-serif;
  font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  transition: all 0.3s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(201,168,76,0.3); }
.error-msg {
  background: rgba(224,80,80,0.1); border: 1px solid var(--error);
  color: var(--error); padding: 0.8rem; border-radius: 10px;
  font-size: 0.9rem; margin-bottom: 1.5rem; font-weight: 600;
}
.back-link { display: inline-block; margin-top: 1.5rem; color: #666; text-decoration: none; font-size: 0.9rem; }
.back-link:hover { color: var(--cream); }
</style>
</head>
<body>
<div class="login-card">
  <span class="icon">🔒</span>
  <h1>Admin Access</h1>
  <p class="subtitle">Please enter the password to continue</p>

  {% if error %}
    <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required autofocus>
    </div>
    <button type="submit" class="btn">Login</button>
  </form>

  <a href="/" class="back-link">← Back to Portal</a>
</div>
</body>
</html>
